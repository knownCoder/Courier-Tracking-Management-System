<!DOCTYPE html>
<html>

<head>
    <title>Courier Tracking System</title>
</head>

<body>

    <h1>Track Shipment</h1>

    <form action="/track" method="POST">

        <input
            type="text"
            name="tracking_id"
            placeholder="Enter Tracking ID"
            required
        >

        <button type="submit">
            Track
        </button>

    </form>

</body>

</html>
