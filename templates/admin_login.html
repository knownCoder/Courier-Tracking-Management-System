<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg, #0d6efd, #6610f2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card{
            width: 400px;
            border-radius: 15px;
        }

        .logo{
            font-size: 60px;
        }
    </style>
</head>

<body>

    <div class="card shadow-lg login-card">

        <div class="card-body p-5">

            <div class="text-center mb-4">
                <div class="logo">📦</div>

                <h2>Courier Admin</h2>

                <p class="text-muted">
                    Login to manage shipments
                </p>
            </div>

            <form method="POST">

                <div class="mb-3">

                    <label class="form-label">
                        Username
                    </label>

                    <input
                        type="text"
                        name="username"
                        class="form-control"
                        placeholder="Enter username"
                        required>

                </div>

                <div class="mb-4">

                    <label class="form-label">
                        Password
                    </label>

                    <input
                        type="password"
                        name="password"
                        class="form-control"
                        placeholder="Enter password"
                        required>

                </div>

                <button
                    type="submit"
                    class="btn btn-primary w-100">

                    Login
                </button>

            </form>

            {% if error %}
            <div class="alert alert-danger mt-3">
                {{ error }}
            </div>
            {% endif %}

        </div>

    </div>

</body>
</html>
